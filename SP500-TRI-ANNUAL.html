<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* This makes the page fill the entire screen */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; /* Stack title and chart vertically */
            align-items: center;    /* Center horizontally */
            justify-content: flex-start; /* vertically */
            font-family: sans-serif;
            padding-top: 1vh;
            background-color: #edfcfc;
        }
        
        h1 {
            color: darkblue;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px; /* Space between title and chart */
        }

        .chart-container {
            width: 100vw;
            height: 90vh; /* Made it higher as you requested */
            position: relative; /* Needed for the absolute positioning below */
            overflow: hidden;
        }

        iframe {
            border: none;
            width: 100%;   /* Fills the container */
            height: 100%;  /* Fills the container */
            display: block;
            /* THIS PART CENTERS THE CONTENT INSIDE */
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

    <h1>hello</h1>

    <div class="chart-container">
    <iframe src="source/ch_SP500_TRI_annual.html"></iframe>
    </div>

</body>
</html>
