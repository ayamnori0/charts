<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* This makes the page fill the entire screen */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column; /* Stack title and chart vertically */
            align-items: center;    /* Center horizontally */
            justify-content: center; /* Center vertically */
            font-family: sans-serif;
        }

        h1 {
            color: darkblue;
            font-weight: bold;
            margin-bottom: 20px; /* Space between title and chart */
        }

        iframe {
            border: none;
            width: 80%;   /* Adjust width as needed */
            height: 60vh; /* Takes up 60% of the screen height */
        }
    </style>
</head>
<body>

    <h1>hello</h1>

    <iframe src="source/chart.html"></iframe>

</body>
</html>
